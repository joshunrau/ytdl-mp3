<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>ytdl-mp3</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <form>
        <label for="url-box">Enter URL of Video to Download:</label>
        <input type="url-box" name="url-box" id="url-box" placeholder="https://www.youtube.com/" size="50">
        <button id="download-button" type="submit">Download</button>
    </form>
    <p>Example URL: https://www.youtube.com/watch?v=dQw4w9WgXcQ</p>
</body>
</html>
