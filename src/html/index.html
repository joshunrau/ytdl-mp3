<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>ytdl-mp3</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <h1>ytdl-mp3</h1>
    <form>
        <label for="title-box" id="title-box-label">Title:</label>
        <input type="text" name="title-box" id="title-box" size="50">
        <label for="artist-box" id="artist-box-label">Artist:</label>
        <input type="text" name="artist-box" id="artist-box" size="50">
        <label for="album-box" id="album-box-label">Album:</label>
        <input type="text" name="album-box" id="album-box" size="50">
        <label for="url-box" id="url-box-label">URL:</label>
        <input type="url-box" name="url-box" id="url-box" size="50">
        <button id="download-button" type="submit">Download</button>
